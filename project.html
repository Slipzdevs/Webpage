<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #333;
        font-family: Arial, Helvetica, sans-serif;
      }

      /* Main container */

      .container {
        width: 90%;
        max-width: 900px;
      }

      /* Content box */

      .content {
        background: #7fe0be;
        padding: 40px;
        border-radius: 15px;
      }

      /* Title */

      .content h1 {
        text-align: center;
      }

      /* Project container */

      .project-container {
        display: flex;
        gap: 25px;
        margin-top: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* Project card */

      .project-card {
        background: white;
        padding: 20px;
        width: 220px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      /* Images */

      img {
        max-width: 100%;
        height: auto;
      }

      /* Back button */

      .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 18px;
        background: #2e8b57;
        color: white;
        text-decoration: none;
        border-radius: 6px;
      }

      .back-btn:hover {
        background: #256b45;
      }

      /* Responsive */

      @media (max-width: 768px) {
        .project-container {
          flex-direction: column;
          align-items: center;
        }

        .project-card {
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="content">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        <h1>Project</h1>

        <div class="project-container">
          <div class="project-card">
            <h3>Project 1</h3>
            <p>Website Development using HTML and CSS.</p>
          </div>

          <div class="project-card">
            <h3>Project 2</h3>
            <p>Student Management System.</p>
          </div>

          <div class="project-card">
            <h3>Project 3</h3>
            <p>Simple Mobile App UI Design.</p>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
