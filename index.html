<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        background: #f2f2f2;
      }

      /* Layout */

      .container {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */

      .menu {
        width: 220px;
        background: #2e8b57;
        padding: 20px;
      }

      .menu h2 {
        color: white;
        text-align: center;
        margin-bottom: 20px;
      }

      .menu a {
        display: block;
        padding: 10px;
        margin: 10px 0;
        border: 2px solid white;
        border-radius: 8px;
        text-decoration: none;
        color: white;
        text-align: center;
        transition: 0.3s;
      }

      .menu a:hover {
        background: white;
        color: #2e8b57;
      }

      /* Content */

      .content {
        flex: 1;
        padding: 30px;
        background: #333;
        color: white;
      }

      /* Member Cards */

      .team {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .card {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
      }

      /* Footer */

      footer {
        background: #2e8b57;
        color: white;
        text-align: center;
        padding: 10px;
      }

      /* Responsive */

      @media (max-width: 768px) {
        .container {
          flex-direction: column;
        }

        .menu {
          width: 100%;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
        }

        .menu h2 {
          width: 100%;
        }

        .menu a {
          flex: 1 1 120px;
          margin: 5px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <nav class="menu">
        <h2>MENU</h2>

        <a href="index.html">Home Page</a>
        <a href="project.html">Project</a>
        <a href="member.html">Member</a>
        <a href="github.html">Github</a>
        <a href="contact.html">Contact</a>
        <footer>Copyright &copy; by Ngorn  Sivgech</footer>
      </nav>

      <section class="content">
        <h1>Home</h1>
        <p>Welcome to our project team website.</p>
      </section>
    </div>
  </body>
</html>
