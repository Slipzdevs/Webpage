<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #333;
        font-family: Arial, Helvetica, sans-serif;
      }

      /* Main container */

      .container {
        border: 1px solid;
        border-radius: 20px;
        padding: 30px;
        background: aquamarine;
        width: 90%;
        max-width: 900px;
      }

      /* Title */

      .content h1 {
        text-align: center;
      }

      /* Team row */

      .team {
        display: flex;
        gap: 25px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      /* Card */

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        width: 220px;
      }

      /* Images */

      img {
        max-width: 100%;
        height: auto;
      }

      .card img {
        width: 90px;
        height: 110px;
        border-radius: 10px;
      }

      /* Skills */

      .skill-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
      }

      .skill {
        background: #2e8b57;
        color: white;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 13px;
      }

      /* Back button */

      .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 18px;
        background: #2e8b57;
        color: white;
        text-decoration: none;
        border-radius: 6px;
      }

      .back-btn:hover {
        background: #256b45;
      }

      /* Responsive */

      @media (max-width: 768px) {
        .team {
          flex-direction: column;
          align-items: center;
        }

        .card {
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="content">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        <h1>Team Members</h1>

        <div class="team">
          <div class="card">
            <img src="4x6.JPG" />
            <h3>Ngorn Sivgech</h3>
            <p>Frontend Developer</p>

            <div class="skill-container">
              <span class="skill">HTML</span>
              <span class="skill">CSS</span>
              <span class="skill">JavaScript</span>
              <span class="skill">Flutter</span>
            </div>
          </div>

          <div class="card">
            <img src="member2.jpg" />
            <h3>Khon Narong</h3>
            <p>Backend Developer</p>

            <div class="skill-container">
              <span class="skill">Java</span>
              <span class="skill">MySQL</span>
              <span class="skill">API</span>
              <span class="skill">Springboots</span>
            </div>
          </div>

          <div class="card">
            <img src="member3.jpg" />
            <h3>Kosal Sopheak</h3>
            <p>UI Designer</p>

            <div class="skill-container">
              <span class="skill">Figma</span>
              <span class="skill">CSS</span>
              <span class="skill">Photoshop</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
