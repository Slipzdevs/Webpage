<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github</title>
    <style>
      body {
        background-color: #333;
      }
      @media (max-width: 768px) {
        .menu {
          width: 100%;
          text-align: center;
        }

        .container {
          flex-direction: column;
        }
      }
      .content {
        max-width: 900px;
        margin: 40px auto;
        background: #7fe0be;
        padding: 40px;
        border-radius: 15px;
        margin-top: 15%;
      }
      .github-container {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
      }
      img {
        max-width: 100%;
        height: auto;
      }

      .github-card {
        background: #eee;
        padding: 25px;
        width: 220px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }

      .github-card h3 {
        margin-bottom: 10px;
      }

      .github-card p {
        font-size: 14px;
        margin-bottom: 15px;
      }

      .github-btn {
        display: inline-block;
        padding: 8px 16px;
        background: #222;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
      }

      .github-btn:hover {
        background: #444;
      }
      .back-btn:hover {
        background: #256b45;
      }
      .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 18px;
        background: #2e8b57;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
      }

      .back-btn:hover {
        background: #256b45;
      }
      .content h1 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="content">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        <h1>Github</h1>

        <div class="github-container">
          <div class="github-card">
            <h3>Ngorn Sivgech</h3>
            <p>Click button below to go to Personal account github</p>
            <a href="https://github.com/Slipzdevs" class="github-btn"
              >💻 View Github</a
            >
          </div>

          <div class="github-card">
            <h3>Khon Narong</h3>
            <p>Click button below to go to Personal account github</p>
            <a href="https://github.com/member2" class="github-btn"
              >💻 View Github</a
            >
          </div>

          <div class="github-card">
            <h3>Kosal Sopheak</h3>
            <p>Click button below to go to Personal account github</p>
            <a href="https://github.com/Kosal-Sopheak" class="github-btn"
              >💻 View Github</a
            >
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
